<!doctype html>
<html lang="en" data-mode="{{DATA_MODE}}">
<head>
<meta charset="utf-8">
<title>{{TITLE}}</title>
<style>
/*{{PAGE_CSS}}*/
/*{{KATEX_CSS}}*/
/*{{VARIABLES_CSS}}*/
/*{{THEME_CSS}}*/
/*{{USER_VARS}}*/

/* Print-only document chrome.
   @page margin is 0 so the entire page surface is paintable; the
   user-configured page margin becomes body padding instead. This way
   the margin area is the same colour as the document body — no white
   strip in dark-mode PDFs. */
html, body { margin: 0; padding: 0; }
html { background: var(--md-color-bg); }
body {
  background: var(--md-color-bg);
  color: var(--md-color-text);
  padding: var(--md-pdf-margin, 2cm);
  min-height: 100vh;
  box-sizing: border-box;
}
body > .md-doc {
  /* Inside the print body, .md-doc fills the content area (body
     already provides the visual margin via padding). */
  max-width: none;
  width: 100%;
  margin: 0;
  padding: 0;
  background: transparent;
}

.doc-header {
  text-align: center;
  margin-bottom: 2em;
  padding-bottom: 1em;
  border-bottom: 1px solid var(--md-color-rule);
}
.doc-title {
  font-family: var(--md-font-headings);
  color: var(--md-color-headings);
  font-size: 2.2em;
  margin: 0 0 0.4em 0;
  border-bottom: none !important;
}
.doc-author, .doc-date {
  color: var(--md-color-text);
  opacity: 0.7;
  font-size: 0.95em;
}
.doc-date { margin-top: 0.2em; }

/* Avoid breaking key blocks across pages */
pre, .callout, table, blockquote { page-break-inside: avoid; }
h1, h2, h3 { page-break-after: avoid; }
img, svg, .mermaid { page-break-inside: avoid; }

/* Manual page breaks (\pagebreak / \newpage in source) */
.md-doc .page-break {
  break-before: page;
  page-break-before: always;
  height: 0;
  margin: 0;
  border: 0;
}
.md-doc .page-break::before { display: none; }

/*{{CUSTOM_CSS}}*/
</style>
</head>
<body>
<article class="md-doc">
{{FRONTMATTER_HEADER}}
{{BODY}}
</article>

<script type="module">
import mermaid from "{{MERMAID_URL}}";

(async () => {
  mermaid.initialize({
    startOnLoad: false,
    theme: "default",
    securityLevel: "loose",
    fontFamily: getComputedStyle(document.body).getPropertyValue("--md-font-body"),
    gantt: { useWidth: 800 },
  });

  const nodes = Array.from(document.querySelectorAll("pre.mermaid"));
  if (nodes.length > 0) {
    try {
      await mermaid.run({ nodes });
    } catch (e) {
      console.error("mermaid render failed", e);
    }
  }

  // Wait one more frame to make sure layout settled.
  await new Promise((r) => requestAnimationFrame(() => requestAnimationFrame(r)));
  window.__renderReady = true;
})();
</script>
</body>
</html>
